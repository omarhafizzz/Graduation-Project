apiVersion: apps/v1
kind: Deployment
metadata:
  name: electravision
  namespace: default
  labels:
    app: electravision
spec:
  replicas: 2
  selector:
    matchLabels:
      app: electravision
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: electravision
    spec:
      containers:
        - name: electravision
          image: omarhafiz/electrical:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: FLASK_ENV
              value: "production"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"